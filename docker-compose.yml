version: "3.9"

services:
  # ─── PostgreSQL with TimescaleDB ──────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cold_storage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cold_storage_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cold_storage_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery broker + cache) ────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cold_storage_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Mosquitto MQTT Broker (Dev only — AWS IoT Core in prod) ─────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: cold_storage_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (plaintext — dev only, mTLS on IoT Core in prod)
      - "9001:9001"   # WebSocket
    volumes:
      - ./infra/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health/check", "-m", "ping", "-q", "0"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: cold_storage_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_dev_password@db:5432/cold_storage_dev
      REDIS_URL: redis://:redis_dev_password@redis:6379/0
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_USE_TLS: "false"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: cold_storage_celery
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_dev_password@db:5432/cold_storage_dev
      REDIS_URL: redis://:redis_dev_password@redis:6379/0
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_USE_TLS: "false"
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,alerts,notifications

  # ─── Celery Beat (Scheduler) ───────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: cold_storage_celery_beat
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_dev_password@db:5432/cold_storage_dev
      REDIS_URL: redis://:redis_dev_password@redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── Observability Stack (Prometheus + Grafana) ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cold_storage_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cold_storage_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
  prometheus_data:
  grafana_data:
