name: Web Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          VITE_USE_MOCK: "false"
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  deploy:
    name: Deploy to S3 + CloudFront (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: List S3 buckets and check target
        run: |
          echo "=== All buckets in account ==="
          aws s3 ls
          echo "=== Checking target: ${{ secrets.WEB_S3_BUCKET }} ==="
          aws s3 ls s3://${{ secrets.WEB_S3_BUCKET }} && echo "Bucket OK" || echo "Bucket NOT accessible"
      - name: Create bucket if missing
        run: |
          aws s3api head-bucket --bucket ${{ secrets.WEB_S3_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ secrets.WEB_S3_BUCKET }} \
            --region ${{ secrets.AWS_REGION }} \
            $([ "${{ secrets.AWS_REGION }}" != "us-east-1" ] && echo "--create-bucket-configuration LocationConstraint=${{ secrets.AWS_REGION }}")
      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.WEB_S3_BUCKET }} --delete
      - name: Set index.html no-cache
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.WEB_S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"
      - name: Invalidate CloudFront cache
        continue-on-error: true
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
