name: Web Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Set API URL
        id: apiurl
        run: |
          API_URL="${{ secrets.VITE_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="http://cold-storage-alb-prod-890284825.us-east-1.elb.amazonaws.com/api/v1"
            echo "Secret not set — using default backend URL"
          fi
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      - run: npm run build
        working-directory: web
        env:
          VITE_USE_MOCK: "false"
          VITE_API_BASE_URL: ${{ steps.apiurl.outputs.url }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  deploy:
    name: Deploy to portal.smaatechengineering.com/panel/
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3 /panel/ path
        run: |
          aws s3 sync dist/ s3://cold-storage-web-prod-288834682310/panel/ \
            --delete --no-progress
          echo "Deployed to s3://cold-storage-web-prod-288834682310/panel/"

      - name: Set index.html no-cache
        run: |
          aws s3 cp dist/index.html s3://cold-storage-web-prod-288834682310/panel/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache for /panel/*
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3NLYVTA27ZIXC \
            --paths "/panel/*"
          echo "CloudFront invalidated: /panel/*"
          echo "### Deploy complete!" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://portal.smaatechengineering.com/panel/" >> $GITHUB_STEP_SUMMARY
