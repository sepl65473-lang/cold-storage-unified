name: Firmware CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IDF_VERSION: "v5.2.1"

jobs:
  build:
    if: false  # Emergency bypass
    name: ESP-IDF Build
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.1

    steps:
      - uses: actions/checkout@v4

      - name: Verify ESP-IDF environment
        run: |
          . ${IDF_PATH}/export.sh
          idf.py --version
        working-directory: firmware

      - name: Build firmware (target esp32)
        run: |
          . ${IDF_PATH}/export.sh
          idf.py set-target esp32
          idf.py build
        working-directory: firmware

      - name: Check binary size
        run: |
          . ${IDF_PATH}/export.sh
          idf.py size
          idf.py size-components
        working-directory: firmware

      - name: Run unit tests (host-based)
        run: |
          . ${IDF_PATH}/export.sh
          idf.py -C test build
        working-directory: firmware

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-build-${{ github.sha }}
          path: |
            firmware/build/*.bin
            firmware/build/*.elf
            firmware/build/flasher_args.json
          retention-days: 30

  ota_publish:
    if: false && github.ref == 'refs/heads/main'  # Emergency bypass
    name: Publish OTA to S3 (main only)
    runs-on: ubuntu-latest
    needs: build

    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware-build-${{ github.sha }}
          path: firmware-artifacts/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Compute SHA-256 hash
        run: |
          sha256sum firmware-artifacts/cold_storage.bin > firmware-artifacts/cold_storage.bin.sha256
          cat firmware-artifacts/cold_storage.bin.sha256

      - name: Upload firmware to S3
        run: |
          VERSION=$(cat firmware/version.txt)
          aws s3 cp firmware-artifacts/cold_storage.bin \
            s3://${{ secrets.FIRMWARE_S3_BUCKET }}/releases/${VERSION}/cold_storage.bin \
            --metadata sha256hash=$(sha256sum firmware-artifacts/cold_storage.bin | awk '{print $1}')
          aws s3 cp firmware-artifacts/cold_storage.bin.sha256 \
            s3://${{ secrets.FIRMWARE_S3_BUCKET }}/releases/${VERSION}/cold_storage.bin.sha256

      - name: Notify backend of new firmware version
        run: |
          VERSION=$(cat firmware/version.txt)
          curl -X POST ${{ secrets.BACKEND_API_URL }}/api/v1/ota/releases \
            -H "Authorization: Bearer ${{ secrets.OTA_SERVICE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"${VERSION}\", \"s3_key\": \"releases/${VERSION}/cold_storage.bin\"}"
