name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build & push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/cold-storage-backend:$IMAGE_TAG \
                       -t $ECR_REGISTRY/cold-storage-backend:latest \
                       --target production \
                       ./backend
          docker push $ECR_REGISTRY/cold-storage-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/cold-storage-backend:latest
          echo "image=$ECR_REGISTRY/cold-storage-backend:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ECS (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Register new task definition with updated image
        id: task-def
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          # Fetch current task definition, strip read-only fields, update image
          aws ecs describe-task-definition \
            --task-definition backend \
            --query 'taskDefinition' \
            --output json \
          | jq --arg IMAGE "$IMAGE" '
              .containerDefinitions[0].image = $IMAGE
              | del(.taskDefinitionArn, .revision, .status,
                    .requiresAttributes, .compatibilities,
                    .registeredAt, .registeredBy, .deregisteredAt)
            ' > new-task-def.json

          # Register the new revision and capture its ARN
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered new task definition: $NEW_ARN"

      - name: Deploy new task definition to ECS
        run: |
          aws ecs update-service \
            --cluster cold-storage-prod-cluster \
            --service backend \
            --task-definition ${{ steps.task-def.outputs.arn }} \
            --force-new-deployment
          echo "ECS deployment triggered with new image"
