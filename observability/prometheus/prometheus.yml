global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']
  
  - job_name: 'celery'
    static_configs:
      - targets: ['api:8000'] # Assuming exporter on same host/port

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
